[build]
  base    = "apps/web"
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[functions]
  # Path is relative to `base` ("apps/web"), so ../../functions = repo-root/functions
  directory    = "../../functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
